<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
  </g>
  <circle cx="100" cy="150" r="80" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1100" cy="150" r="100" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="150" cy="80" r="3" fill="#00d2ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="300" cy="220" r="2" fill="#7b2ff7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="900" cy="70" r="2.5" fill="#00d2ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1050" cy="230" r="3" fill="#7b2ff7" opacity="0.6" filter="url(#glow)"/>
  <g transform="translate(460, 60)" filter="url(#glow)">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <text x="25" y="33" font-family="monospace" font-size="16" fill="#00d2ff" text-anchor="middle" font-weight="bold">{}</text>
  </g>
  <g transform="translate(690, 60)" filter="url(#glow)">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <text x="25" y="33" font-family="monospace" font-size="16" fill="#7b2ff7" text-anchor="middle" font-weight="bold">AI</text>
  </g>
  <line x1="510" y1="85" x2="690" y2="85" stroke="url(#accent)" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="600" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-1" filter="url(#glow)">Curated LLM APIs</text>
  <text x="600" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#a0a0b0" text-anchor="middle">A comprehensive comparison of LLM API providers</text>
  <g transform="translate(340,235)"><rect width="80" height="26" rx="13" fill="#00d2ff" opacity="0.15"/><text x="40" y="17" font-family="system-ui,sans-serif" font-size="11" fill="#00d2ff" text-anchor="middle">Pricing</text></g>
  <g transform="translate(440,235)"><rect width="80" height="26" rx="13" fill="#7b2ff7" opacity="0.15"/><text x="40" y="17" font-family="system-ui,sans-serif" font-size="11" fill="#7b2ff7" text-anchor="middle">Models</text></g>
  <g transform="translate(540,235)"><rect width="80" height="26" rx="13" fill="#00d2ff" opacity="0.15"/><text x="40" y="17" font-family="system-ui,sans-serif" font-size="11" fill="#00d2ff" text-anchor="middle">Features</text></g>
  <g transform="translate(640,235)"><rect width="80" height="26" rx="13" fill="#7b2ff7" opacity="0.15"/><text x="40" y="17" font-family="system-ui,sans-serif" font-size="11" fill="#7b2ff7" text-anchor="middle">SDKs</text></g>
  <g transform="translate(740,235)"><rect width="100" height="26" rx="13" fill="#00d2ff" opacity="0.15"/><text x="50" y="17" font-family="system-ui,sans-serif" font-size="11" fill="#00d2ff" text-anchor="middle">Open Source</text></g>
</svg>